ignoreWorkspaceRootCheck: true

minimumReleaseAgeExclude:
  - '@aa900031/release-it-config@1.0.0'

shamefullyHoist: true
shellEmulator: true
strictPeerDependencies: false
trustPolicy: no-downgrade
trustPolicyIgnoreAfter: 43200
autoInstallPeers: false

packages:
  - docs
  - examples/*
  - packages/*
  - internals/*
  - stories/*
  - packages/nuxt/playground

overrides:
  '@tanstack/vue-query>vue-demi': latest

allowBuilds:
  '@aa900031/eslint-config': false
  '@parcel/watcher': true
  better-sqlite3: true
  esbuild: true
  msw: true
  sharp: true
  vue-demi: true
