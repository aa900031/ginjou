name: Release

on:
  # NOTE: pushing >3 tags in one `git push` fires ZERO tag events (GitHub limitation),
  # so releases are triggered explicitly via workflow_dispatch (see scripts/release).
  # The tag trigger is kept as a fallback for single-package releases (<=3 tags).
  push:
    tags:
      - '\@ginjou/*\@[0-9]+\.[0-9]+\.[0-9]+*'
  workflow_dispatch:

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    concurrency:
      group: npm-publish
      cancel-in-progress: false
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup
        uses: aa900031/github-actions/setup-node@main

      - name: Build packages
        run: pnpm run build:pkgs

      - name: Update npm
        run: npm install -g npm@latest

      - name: Publish to npm
        run: pnpm -r publish --access public --no-git-checks
