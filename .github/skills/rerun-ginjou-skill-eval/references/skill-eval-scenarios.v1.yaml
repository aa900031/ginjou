version: 1
name: ginjou-skill-hit-rate-scenarios
description: Baseline scenario bank for comparing ginjou skill variants. Extend by appending new scenarios.
scoring:
  trigger_hit: [0, 0.5, 1]
  reference_routing: [0, 1, 1.5, 2]
  no_assumption_risk: [0, 0.5, 1]
  backend_specific_coverage: [0, 0.5, 1]
  max_per_scenario: 5
scenarios:
  - id: S01
    title: Choosing Backend Provider
    tags: [backend-choice]
    prompt: "I'm building an admin panel with Vue. Should I use Supabase, Directus, or a custom REST API?"
    expected_best_route:
      - "backend comparison guidance without invented claims"
      - "setup reference + backend-specific references"
  - id: S02
    title: Supabase Postgrest Relations and Count Type
    tags: [backend-meta]
    prompt: "I'm using @ginjou/with-supabase and need to include related user data in my posts list. How do I select specific fields and set count type to exact for pagination?"
    expected_best_route:
      - "backend-supabase reference"
      - "meta.select and meta.count guidance"
  - id: S03
    title: Directus Query Options in Meta
    tags: [backend-meta]
    prompt: "Using Directus as backend, I want to apply filters to my getList query and select only specific fields including nested relations. What's the meta syntax?"
    expected_best_route:
      - "backend-directus reference"
      - "meta.query fields/filter syntax"
  - id: S04
    title: REST API Auth Header and Custom Client
    tags: [backend-meta]
    prompt: "I have a REST API that requires a custom Authorization header. Can I pass my own ofetch client to Ginjou's REST fetcher?"
    expected_best_route:
      - "backend-rest-api reference"
      - "custom client and headers guidance"
  - id: S05
    title: Nuxt SSR with Multi-Backend Fetchers
    tags: [setup-ssr, backend-choice]
    prompt: "I have a Nuxt app that needs different backends for different resources - one for user data (Supabase), one for products (REST API). How do I set this up in app.vue for SSR?"
    expected_best_route:
      - "setup reference for Nuxt SSR"
      - "resources reference for meta.fetcherName"
      - "matching backend references"
  - id: S06
    title: Delete with Custom Confirmation Modal
    tags: [crud-non-page]
    prompt: "In a data table page, I have a delete button in each row that opens a custom confirmation modal. Should I use useDeleteOne directly or a controller like useEdit?"
    expected_best_route:
      - "data-composables reference"
      - "non-page CRUD decision"
  - id: S07
    title: Autocomplete Select with Filtering
    tags: [controller-choice]
    prompt: "I need a select dropdown that loads a list of users remotely and filters by name as the user types. Should I use useSelect or useList?"
    expected_best_route:
      - "controllers reference"
      - "useSelect preference for remote options"
  - id: S08
    title: Live Updating Dashboard List
    tags: [realtime]
    prompt: "I want my admin dashboard list page to auto-refresh whenever new records are added on the server. Do I need custom polling or can Ginjou handle realtime subscriptions?"
    expected_best_route:
      - "realtime reference"
      - "fallback when transport is unavailable"
  - id: S09
    title: Fresh Nuxt Project with Directus
    tags: [setup-ssr, backend-choice]
    prompt: "I'm starting a brand new Nuxt 4 admin dashboard with Directus backend. Give me the full setup steps."
    expected_best_route:
      - "setup reference for Nuxt"
      - "backend-directus reference"
