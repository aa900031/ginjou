version: 1
name: ginjou-skill-hit-rate-scenarios
description: Baseline scenario bank for comparing ginjou skill variants. Extend by appending new scenarios.
scoring:
  trigger_hit: [0, 0.5, 1]
  reference_routing: [0, 1, 1.5, 2]
  no_assumption_risk: [0, 0.5, 1]
  backend_specific_coverage: [0, 0.5, 1]
  max_per_scenario: 5
scenarios:
  - id: S01
    title: Choosing Backend Provider
    tags: [backend-choice]
    prompt: "I'm building an admin panel with Vue. Should I use Supabase, Directus, or a custom REST API?"
    expected_best_route:
      - "backend comparison guidance without invented claims"
      - "setup reference + backend-specific references"
  - id: S02
    title: Supabase Postgrest Relations and Count Type
    tags: [backend-meta]
    prompt: "I'm using @ginjou/with-supabase and need to include related user data in my posts list. How do I select specific fields and set count type to exact for pagination?"
    expected_best_route:
      - "backend-supabase reference"
      - "meta.select and meta.count guidance"
  - id: S03
    title: Directus Query Options in Meta
    tags: [backend-meta]
    prompt: "Using Directus as backend, I want to apply filters to my getList query and select only specific fields including nested relations. What's the meta syntax?"
    expected_best_route:
      - "backend-directus reference"
      - "meta.query fields/filter syntax"
  - id: S04
    title: REST API Auth Header and Custom Client
    tags: [backend-meta]
    prompt: "I have a REST API that requires a custom Authorization header. Can I pass my own ofetch client to Ginjou's REST fetcher?"
    expected_best_route:
      - "backend-rest-api reference"
      - "custom client and headers guidance"
  - id: S05
    title: Nuxt SSR with Multi-Backend Fetchers
    tags: [setup-ssr, backend-choice]
    prompt: "I have a Nuxt app that needs different backends for different resources - one for user data (Supabase), one for products (REST API). How do I set this up in app.vue for SSR?"
    expected_best_route:
      - "setup reference for Nuxt SSR"
      - "resources reference for meta.fetcherName"
      - "matching backend references"
  - id: S06
    title: Delete with Custom Confirmation Modal
    tags: [crud-non-page]
    prompt: "In a data table page, I have a delete button in each row that opens a custom confirmation modal. Should I use useDeleteOne directly or a controller like useEdit?"
    expected_best_route:
      - "data-composables reference"
      - "non-page CRUD decision"
  - id: S07
    title: Autocomplete Select with Filtering
    tags: [controller-choice]
    prompt: "I need a select dropdown that loads a list of users remotely and filters by name as the user types. Should I use useSelect or useList?"
    expected_best_route:
      - "controllers reference"
      - "useSelect preference for remote options"
  - id: S08
    title: Live Updating Dashboard List
    tags: [realtime]
    prompt: "I want my admin dashboard list page to auto-refresh whenever new records are added on the server. Do I need custom polling or can Ginjou handle realtime subscriptions?"
    expected_best_route:
      - "realtime reference"
      - "fallback when transport is unavailable"
  - id: S09
    title: Fresh Nuxt Project with Directus
    tags: [setup-ssr, backend-choice]
    prompt: "I'm starting a brand new Nuxt 4 admin dashboard with Directus backend. Give me the full setup steps."
    expected_best_route:
      - "setup reference for Nuxt"
      - "backend-directus reference"
  - id: S10
    title: Vue Admin Root Wiring Without API Names
    tags: [setup-ssr]
    prompt: "In a Vue 3 admin app, data client setup, backend wiring, and router-aware admin state are currently initialized inside feature pages. Should that stay there, or be moved somewhere more global?"
    expected_best_route:
      - "setup reference for root-only provider wiring"
      - "framework-specific router context guidance"
  - id: S11
    title: Route-Driven Detail and Edit Pages
    tags: [controller-choice]
    prompt: "My detail and edit pages derive record ids from the URL. Under what conditions can the page infer the current resource from routing, and when does that need to be wired explicitly?"
    expected_best_route:
      - "controllers reference for auto-resolution limits"
      - "resources reference for route mapping prerequisites"
  - id: S12
    title: Undoable Delete Without Feedback System
    tags: [crud-non-page]
    prompt: "Product wants destructive actions to support an undo window, but the app does not have any toast or feedback system wired yet. What has to exist before that interaction model is safe to implement?"
    expected_best_route:
      - "notifications reference for undoable prerequisites"
      - "decision rules that prevent unsupported undoable mode"
  - id: S13
    title: Supabase Login Method Selection
    tags: [backend-choice, backend-meta]
    prompt: "For an admin dashboard on Supabase, I need both OAuth and OTP login flows. Which login types should be passed and how are params shaped?"
    expected_best_route:
      - "backend-supabase auth method table"
      - "authentication integration guidance"
  - id: S14
    title: Directus Aggregation and Grouping
    tags: [backend-meta]
    prompt: "I need a status summary widget from Directus with grouped counts. Which meta options should be used for aggregate and groupBy?"
    expected_best_route:
      - "backend-directus aggregate and groupBy options"
      - "data retrieval guidance for dashboard widgets"
  - id: S15
    title: Realtime Fallback Strategy
    tags: [realtime]
    prompt: "The backend cannot emit subscription events in this environment. What should the list-refresh strategy be so the UI still stays reasonably up to date?"
    expected_best_route:
      - "realtime reference fallback rules"
      - "query/controller refetch or polling strategy"
  - id: S16
    title: Remote Option Loading Without API Names
    tags: [controller-choice]
    prompt: "I need an autocomplete field that loads users from the server as the person types, and it must still show the current selection even if that option is not in the latest search results. Should this be treated like a normal resource list page?"
    expected_best_route:
      - "controllers reference for dedicated option-loading pattern"
      - "guidance that this should not be modeled as a normal list page"
  - id: S17
    title: Inline Edit Flow in Non-Page UI
    tags: [crud-non-page]
    prompt: "A dashboard widget opens a side panel to update one record inline and save it without navigating away. Is this the kind of flow that should use page-level CRUD abstractions, or lower-level data operations?"
    expected_best_route:
      - "data-composables reference for non-page mutations"
      - "decision rule separating page CRUD from custom UI flows"
  - id: S18
    title: Multi-Section Admin With Nested Routes
    tags: [setup-ssr, backend-choice]
    prompt: "An admin app has nested sections, route-derived context, and different backends for different areas. Where should route metadata and backend binding live so screens can infer context consistently?"
    expected_best_route:
      - "resources reference for route metadata and per-resource backend binding"
      - "setup guidance for named fetchers and multi-backend wiring"
